<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ibadah Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

</head>

<body class="bg-gray-100">

<div x-data="trackerApp()" x-init="loadData()" class="max-w-md mx-auto min-h-screen bg-gray-50">

<!-- HEADER -->
<div class="bg-green-600 text-white p-4 text-center font-bold text-lg">
Ibadah Tracker
</div>


<!-- DASHBOARD -->
<div class="p-4 space-y-4 pb-24">

<!-- FILTER -->
<div>
<label class="text-sm font-semibold">Filter Tahun</label>

<select x-model="tahunFilter"
@change="loadData()"
class="w-full mt-1 p-2 rounded border">

<option>2026</option>
<option>2025</option>

</select>
</div>


<!-- STATISTIK -->
<div class="grid grid-cols-2 gap-3">

<div class="bg-white p-3 rounded-xl shadow text-center">
<p class="text-xs text-gray-500">Hutang Sholat</p>
<p class="text-xl font-bold text-green-600" x-text="totalSholat"></p>
</div>

<div class="bg-white p-3 rounded-xl shadow text-center">
<p class="text-xs text-gray-500">Hutang Puasa</p>
<p class="text-xl font-bold text-green-600" x-text="totalPuasa"></p>
</div>

</div>


<!-- LIST SHOLAT -->
<div class="bg-white p-4 rounded-xl shadow">

<h2 class="font-semibold mb-2">Hutang Sholat</h2>

<ul class="text-sm space-y-1">

<template x-for="item in sholatList">

<li class="flex justify-between">
<span x-text="item[2]"></span>
<span x-text="item[1]"></span>
</li>

</template>

</ul>

</div>



<!-- LIST PUASA -->
<div class="bg-white p-4 rounded-xl shadow">

<h2 class="font-semibold mb-2">Hutang Puasa</h2>

<ul class="text-sm space-y-1">

<template x-for="item in puasaList">

<li class="flex justify-between">
<span x-text="item[1]"></span>
<span x-text="item[2]"></span>
</li>

</template>

</ul>

</div>

</div>



<!-- NAVIGATION -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t flex">

<button
@click="openSholat=true"
class="flex-1 p-3 text-sm">
Input Sholat
</button>

<button
@click="openPuasa=true"
class="flex-1 p-3 text-sm">
Input Puasa
</button>

</div>



<!-- MODAL SHOLAT -->
<div
x-show="openSholat"
class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">

<div class="bg-white w-80 rounded-xl p-4 space-y-3">

<h2 class="font-semibold">Input Hutang Sholat</h2>

<select x-model="formSholat.nama" class="w-full border p-2 rounded">

<option>Subuh</option>
<option>Dzuhur</option>
<option>Ashar</option>
<option>Maghrib</option>
<option>Isya</option>

</select>

<input type="date" x-model="formSholat.tanggal" class="w-full border p-2 rounded">

<button
@click="saveSholat()"
class="w-full bg-green-600 text-white p-2 rounded">
Simpan
</button>

<button
@click="openSholat=false"
class="w-full text-gray-500 text-sm">
Batal
</button>

</div>

</div>



<!-- MODAL PUASA -->
<div
x-show="openPuasa"
class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">

<div class="bg-white w-80 rounded-xl p-4 space-y-3">

<h2 class="font-semibold">Input Hutang Puasa</h2>

<input type="date" x-model="formPuasa.tanggal" class="w-full border p-2 rounded">

<input type="text" placeholder="Keterangan"
x-model="formPuasa.nama"
class="w-full border p-2 rounded">

<button
@click="savePuasa()"
class="w-full bg-green-600 text-white p-2 rounded">
Simpan
</button>

<button
@click="openPuasa=false"
class="w-full text-gray-500 text-sm">
Batal
</button>

</div>

</div>


</div>

<script src="js/app.js"></script>

</body>
</html>
