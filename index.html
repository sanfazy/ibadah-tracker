<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Dashboard</title>
   </head>

   <body>
      <h2>Hutang Ibadah</h2>

      <a href="sholat.html">Input Hutang Sholat</a>
      <br>
      <a href="puasa.html">Input Hutang Puasa</a>

      <div id="list"></div>

      <script src="config.js"></script>
      <!-- <script src="app.js"></script> -->

      <script>
         async function loadDashboard(){

         const data = await apiGet("listHutang");

         let html="";

         data.forEach(d=>{

            html += `
               <div class="card">

               <b>${d.tanggal_hutang}</b><br>

               ${d.waktu}<br>

               ${d.keterangan}<br>

               <button onclick="qadha(${d.id})">
                  Qadha
               </button>

               </div>
            `;

         });

         document.getElementById("list").innerHTML = html;

         }
      </script>

   </body>
</html>
