<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Puasa</title>
   </head>
   
   <body>
      <h2>Input Hutang Puasa</h2>

      Tanggal
      <input type="date" id="tanggal">

      Keterangan
      <input type="text" id="ket">

      <button onclick="simpan()">Simpan</button>

      <script>
         await apiPost({

            action:"tambahPuasa",
            tanggal:tanggal,
            ket:ket

         });
      </script>
   </body>
